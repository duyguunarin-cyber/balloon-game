<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎈 Balloon Pop</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:    #FF6B6B;
      --yellow: #FFD93D;
      --green:  #6BCB77;
      --blue:   #4D96FF;
      --purple: #C77DFF;
      --sky1:   #5BC8F5;
      --sky2:   #a8dff7;
      --grass:  #7EC850;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: radial-gradient(ellipse at 50% 0%, #c9eeff 0%, #e8f7ff 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 24px 12px 40px;
    }

    h1.logo {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(28px, 6vw, 44px);
      color: var(--red);
      text-shadow: 3px 3px 0 #fff, 5px 5px 0 rgba(255,107,107,0.2);
      margin-bottom: 6px;
    }

    .tagline {
      font-size: 14px;
      color: #888;
      margin-bottom: 24px;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .tab-btn {
      font-family: 'Fredoka One', cursive;
      font-size: 16px;
      padding: 8px 22px;
      border: 2px solid transparent;
      border-radius: 99px;
      background: rgba(255,255,255,0.6);
      color: #888;
      cursor: pointer;
      transition: all 0.18s;
    }

    .tab-btn.active {
      background: var(--red);
      color: #fff;
      border-color: var(--red);
      box-shadow: 0 3px 10px rgba(255,107,107,0.35);
    }

    /* ── SCREENS ── */
    .screen { display: none; width: 100%; max-width: 520px; }
    .screen.visible { display: block; }

    /* ── GAME WRAP ── */
    #game-wrap {
      width: 100%;
      background: linear-gradient(180deg, var(--sky1) 0%, var(--sky2) 65%, var(--grass) 100%);
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }

    #hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      background: rgba(255,255,255,0.3);
      position: relative;
      z-index: 10;
    }

    .hud-box {
      background: rgba(255,255,255,0.65);
      border-radius: 12px;
      padding: 5px 14px;
      text-align: center;
      min-width: 72px;
    }

    .hud-label { font-size: 10px; color: #555; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
    .hud-val   { font-family: 'Fredoka One', cursive; font-size: 22px; color: #333; line-height: 1.1; }

    #timer-bar-wrap { flex: 1; margin: 0 12px; height: 13px; background: rgba(255,255,255,0.4); border-radius: 99px; overflow: hidden; }
    #timer-bar      { height: 100%; width: 100%; background: linear-gradient(90deg,var(--red),var(--yellow)); border-radius: 99px; transition: width .1s linear; }

    #arena { position: relative; width: 100%; height: 460px; overflow: hidden; }

    .balloon { position: absolute; bottom: -130px; cursor: pointer; animation: float-up linear forwards; touch-action: manipulation; }
    .balloon:hover  { transform: scale(1.08); }
    .balloon:active { transform: scale(0.9); }
    .balloon svg { display: block; pointer-events: none; }

    @keyframes float-up { from { bottom: -130px; } to { bottom: 110%; } }

    .pop-burst { position: absolute; pointer-events: none; animation: burst .4s ease-out forwards; font-size: 26px; z-index: 20; }
    @keyframes burst { 0%{transform:scale(.3);opacity:1} 60%{transform:scale(1.4);opacity:.8} 100%{transform:scale(1.9);opacity:0} }

    .score-fly { position: absolute; pointer-events: none; font-family:'Fredoka One',cursive; font-size:22px; color:#fff; text-shadow:0 2px 6px rgba(0,0,0,.3); animation: fly-up .8s ease-out forwards; z-index:20; }
    @keyframes fly-up { 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(-60px);opacity:0} }

    .cloud { position: absolute; opacity: .65; animation: drift linear infinite; }
    @keyframes drift { from{transform:translateX(-200px)} to{transform:translateX(110%)} }

    /* ── OVERLAY ── */
    #overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(255,255,255,.9);
      z-index: 30; border-radius: 20px; gap: 10px; padding: 20px;
    }

    #overlay h2 { font-family:'Fredoka One',cursive; font-size:30px; color:var(--red); }
    #overlay p  { font-size:15px; color:#555; text-align:center; max-width:280px; }

    .big-score { font-family:'Fredoka One',cursive; font-size:54px; color:var(--red); line-height:1; }

    /* ── NAME INPUT ── */
    .name-row { display:flex; gap:8px; align-items:center; }
    .name-row input {
      font-family:'Nunito',sans-serif; font-size:16px; font-weight:700;
      padding:10px 16px; border:2px solid #ddd; border-radius:99px;
      outline:none; width:200px; text-align:center; transition:border .2s;
    }
    .name-row input:focus { border-color:var(--red); }

    /* ── BTN ── */
    .btn {
      font-family:'Fredoka One',cursive; font-size:19px;
      padding:11px 34px; background:var(--red); color:#fff;
      border:none; border-radius:99px; cursor:pointer;
      box-shadow:0 4px 12px rgba(255,107,107,.35);
      transition:transform .12s, box-shadow .12s;
    }
    .btn:hover  { transform:translateY(-2px); box-shadow:0 6px 18px rgba(255,107,107,.45); }
    .btn:active { transform:scale(.95); }
    .btn.secondary { background:#fff; color:var(--red); border:2px solid var(--red); box-shadow:none; }

    /* ── LEADERBOARD ── */
    #leaderboard-screen { max-width:520px; }

    .lb-card {
      background:#fff; border-radius:20px;
      box-shadow:0 6px 24px rgba(0,0,0,.1);
      overflow:hidden;
    }

    .lb-header {
      background:linear-gradient(135deg,var(--red),#ff9a5c);
      color:#fff; padding:20px 24px 14px;
      font-family:'Fredoka One',cursive;
    }

    .lb-header h2 { font-size:26px; }
    .lb-header p  { font-size:13px; opacity:.85; margin-top:2px; }

    .lb-table { width:100%; border-collapse:collapse; }
    .lb-table th {
      font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px;
      color:#aaa; padding:10px 20px; border-bottom:1px solid #f0f0f0; text-align:left;
    }

    .lb-table td { padding:11px 20px; font-size:15px; border-bottom:1px solid #f9f9f9; }
    .lb-table tr:last-child td { border-bottom:none; }
    .lb-table tr:hover td { background:#fef9f9; }

    .rank-badge {
      width:28px; height:28px; border-radius:50%;
      display:inline-flex; align-items:center; justify-content:center;
      font-family:'Fredoka One',cursive; font-size:13px; color:#fff;
    }

    .rank-1 { background:linear-gradient(135deg,#f7c948,#f0a500); }
    .rank-2 { background:linear-gradient(135deg,#c0c0c0,#909090); }
    .rank-3 { background:linear-gradient(135deg,#cd7f32,#a0522d); }
    .rank-n { background:#eee; color:#888; }

    .score-pill {
      font-family:'Fredoka One',cursive; font-size:17px;
      color:var(--red);
    }

    .empty-lb { padding:40px 20px; text-align:center; color:#bbb; font-size:15px; }

    .lb-refresh {
      padding:14px 20px; text-align:center;
      border-top:1px solid #f0f0f0; font-size:13px; color:#aaa;
    }

    .lb-refresh button {
      background:none; border:none; color:var(--red);
      font-weight:700; cursor:pointer; font-family:'Nunito',sans-serif;
      font-size:13px;
    }
  </style>
</head>
<body>

  <h1 class="logo">🎈 Balloon Pop</h1>
  <p class="tagline">How many balloons can you pop?</p>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('game')">🎮 Play</button>
    <button class="tab-btn"       onclick="showTab('leaderboard')">🏆 Leaderboard</button>
  </div>

  <!-- GAME SCREEN -->
  <div class="screen visible" id="game-screen">
    <div id="game-wrap">

      <div id="arena">
        <svg class="cloud" style="top:25px;width:110px;animation-duration:22s;animation-delay:-4s;" viewBox="0 0 120 50"><ellipse cx="60" cy="35" rx="55" ry="18" fill="white"/><ellipse cx="40" cy="28" rx="28" ry="18" fill="white"/><ellipse cx="75" cy="24" rx="22" ry="16" fill="white"/></svg>
        <svg class="cloud" style="top:75px;width:85px;animation-duration:31s;animation-delay:-16s;"viewBox="0 0 120 50"><ellipse cx="60" cy="35" rx="55" ry="18" fill="white"/><ellipse cx="40" cy="28" rx="28" ry="18" fill="white"/><ellipse cx="75" cy="24" rx="22" ry="16" fill="white"/></svg>
        <svg class="cloud" style="top:15px;width:95px;animation-duration:26s;animation-delay:-22s;" viewBox="0 0 120 50"><ellipse cx="60" cy="35" rx="55" ry="18" fill="white"/><ellipse cx="40" cy="28" rx="28" ry="18" fill="white"/><ellipse cx="75" cy="24" rx="22" ry="16" fill="white"/></svg>
      </div>

      <div id="hud">
        <div class="hud-box"><div class="hud-label">Score</div><div class="hud-val" id="score-disp">0</div></div>
        <div id="timer-bar-wrap"><div id="timer-bar"></div></div>
        <div class="hud-box"><div class="hud-label">Popped</div><div class="hud-val" id="popped-disp">0</div></div>
      </div>

      <!-- START OVERLAY -->
      <div id="overlay">
        <div style="font-size:60px">🎈</div>
        <h2>Balloon Pop!</h2>
        <p>Enter your name and play! Pop as many balloons as you can in 30 seconds.</p>
        <div class="name-row">
          <input type="text" id="player-name" placeholder="Your name?" maxlength="16" autocomplete="off"/>
        </div>
        <button class="btn" id="start-btn">Play! 🎮</button>
      </div>

    </div>
  </div>

  <!-- LEADERBOARD SCREEN -->
  <div class="screen" id="leaderboard-screen">
    <div class="lb-card">
      <div class="lb-header">
        <h2>🏆 Top Players</h2>
        <p>Everyone's scores are here!</p>
      </div>
      <div id="lb-body"><div class="empty-lb">Loading...</div></div>
      <div class="lb-refresh">
        <button onclick="loadLeaderboard()">↻ Refresh</button>
      </div>
    </div>
  </div>

<!-- ══════════════════ SCRIPT ══════════════════ -->
<script>
// ── CONFIG ─────────────────────────────────────────────────────────────
// Scores are saved using the free JSONBin.io service.
// Kendi bin'ini oluşturmak için:
//   1. https://jsonbin.io adresine git, üye ol
//   2. Yeni bir Bin oluştur: içerik olarak [] yaz
//   3. BIN_ID ve API_KEY'i aşağıya yaz
//
// VEYA kendi backend'ini yazarsan BASE_URL'yi değiştir.
//
// ŞU AN: localStorage kullanıyor (demo mod — sadece aynı tarayıcıda görünür)
// Gerçek çok kullanıcı için JSONBin veya kendi sunucun gerekli.

const USE_DEMO = true;   // false yapınca JSONBin'e geçer
const BIN_ID   = 'BURAYA_BIN_ID';
const API_KEY  = 'BURAYA_API_KEY';
const BIN_URL  = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

// ── STATE ───────────────────────────────────────────────────────────────
const COLORS = [
  {body:'#FF6B6B',shine:'#FF9898',string:'#cc3333'},
  {body:'#FFD93D',shine:'#FFE97A',string:'#cc9900'},
  {body:'#6BCB77',shine:'#9DE6A3',string:'#2e7d32'},
  {body:'#4D96FF',shine:'#80B8FF',string:'#1a56cc'},
  {body:'#FF9F43',shine:'#FFc070',string:'#cc6600'},
  {body:'#C77DFF',shine:'#E0AAFF',string:'#7B2FBE'},
  {body:'#F72585',shine:'#FF7EB3',string:'#9a0a4a'},
];
const EMOJIS = ['💥','✨','🌟','⭐','💫'];

let score=0, popped=0, running=false, timeLeft=30;
let spawnTimer, countdownInterval;

// ── DOM ─────────────────────────────────────────────────────────────────
const arena      = document.getElementById('arena');
const overlay    = document.getElementById('overlay');
const scoreDisp  = document.getElementById('score-disp');
const poppedDisp = document.getElementById('popped-disp');
const timerBar   = document.getElementById('timer-bar');
const nameInput  = document.getElementById('player-name');

// ── TABS ─────────────────────────────────────────────────────────────────
function showTab(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('visible'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tab + '-screen').classList.add('visible');
  event.currentTarget.classList.add('active');
  if (tab === 'leaderboard') loadLeaderboard();
}

// ── LEADERBOARD ──────────────────────────────────────────────────────────
async function getScores() {
  if (USE_DEMO) {
    try { return JSON.parse(localStorage.getItem('balon_scores') || '[]'); }
    catch(e) { return []; }
  }
  const res = await fetch(BIN_URL + '/latest', {
    headers: {'X-Master-Key': API_KEY}
  });
  const data = await res.json();
  return data.record || [];
}

async function saveScore(name, score, popped) {
  const scores = await getScores();
  scores.push({ name, score, popped, date: new Date().toLocaleDateString('tr-TR') });
  scores.sort((a,b) => b.score - a.score);
  const top = scores.slice(0, 50); // en fazla 50 kayıt

  if (USE_DEMO) {
    localStorage.setItem('balon_scores', JSON.stringify(top));
    return;
  }
  await fetch(BIN_URL, {
    method: 'PUT',
    headers: {'Content-Type':'application/json','X-Master-Key': API_KEY},
    body: JSON.stringify(top)
  });
}

async function loadLeaderboard() {
  const body = document.getElementById('lb-body');
  body.innerHTML = '<div class="empty-lb">Loading...</div>';
  const scores = await getScores();
  if (!scores.length) {
    body.innerHTML = '<div class="empty-lb">No scores yet. Be the first! 🎈</div>';
    return;
  }
  body.innerHTML = `
    <table class="lb-table">
      <thead><tr>
        <th>#</th><th>Player</th><th>Score</th><th>Balloons</th><th>Date</th>
      </tr></thead>
      <tbody>${scores.map((s,i) => `
        <tr>
          <td><span class="rank-badge ${i<3?'rank-'+(i+1):'rank-n'}">${i+1}</span></td>
          <td><strong>${escHtml(s.name)}</strong></td>
          <td><span class="score-pill">${s.score}</span></td>
          <td>${s.popped} 🎈</td>
          <td style="font-size:13px;color:#bbb">${s.date||''}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── GAME ─────────────────────────────────────────────────────────────────
function makeBalloon() {
  if (!running) return;
  const c        = COLORS[Math.floor(Math.random()*COLORS.length)];
  const size     = 52 + Math.random()*30;
  const x        = 4 + Math.random()*84;
  const duration = 3.2 + Math.random()*4.5;
  const pts      = Math.round(10 + (60-size));

  const el = document.createElement('div');
  el.className = 'balloon';
  el.style.cssText = `left:${x}%;animation-duration:${duration}s`;
  el.innerHTML = `<svg width="${size}" height="${size*1.35}" viewBox="0 0 60 81" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="30" cy="30" rx="28" ry="30" fill="${c.body}"/>
    <ellipse cx="22" cy="18" rx="7" ry="9" fill="${c.shine}" opacity="0.5"/>
    <polygon points="30,60 26,65 34,65" fill="${c.body}"/>
    <line x1="30" y1="65" x2="${28+Math.random()*4}" y2="81" stroke="${c.string}" stroke-width="1.2"/>
  </svg>`;

  el.addEventListener('pointerdown', e => {
    e.preventDefault();
    if (!running) return;
    const r  = el.getBoundingClientRect();
    const ar = arena.getBoundingClientRect();
    popBalloon(el, r.left-ar.left+r.width/2, r.top-ar.top+r.height/2, pts);
  });

  el.addEventListener('animationend', () => el.remove());
  arena.appendChild(el);
  spawnTimer = setTimeout(makeBalloon, 350 + Math.random()*750);
}

function popBalloon(el, bx, by, pts) {
  el.style.pointerEvents='none'; el.remove();
  score+=pts; popped++;
  scoreDisp.textContent = score;
  poppedDisp.textContent = popped;

  const burst = document.createElement('div');
  burst.className='pop-burst';
  burst.style.cssText=`left:${bx-20}px;top:${by-20}px`;
  burst.textContent=EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
  arena.appendChild(burst);
  burst.addEventListener('animationend',()=>burst.remove());

  const fly = document.createElement('div');
  fly.className='score-fly';
  fly.style.cssText=`left:${bx-15}px;top:${by-10}px`;
  fly.textContent='+'+pts;
  arena.appendChild(fly);
  fly.addEventListener('animationend',()=>fly.remove());
}

function startGame() {
  const name = nameInput.value.trim() || 'Misafir';
  score=0; popped=0; timeLeft=30;
  scoreDisp.textContent='0'; poppedDisp.textContent='0';
  timerBar.style.width='100%';
  timerBar.style.background='linear-gradient(90deg,#ff6b6b,#ffd93d)';
  running=true;
  overlay.style.display='none';
  arena.querySelectorAll('.balloon').forEach(b=>b.remove());
  spawnTimer=setTimeout(makeBalloon,300);

  countdownInterval=setInterval(()=>{
    timeLeft--;
    timerBar.style.width=(timeLeft/30*100)+'%';
    if(timeLeft<=10) timerBar.style.background='linear-gradient(90deg,#e74c3c,#ff6b6b)';
    if(timeLeft<=0) endGame(name);
  },1000);
}

async function endGame(name) {
  running=false;
  clearTimeout(spawnTimer);
  clearInterval(countdownInterval);
  timerBar.style.width='0%';

  await saveScore(name, score, popped);

  setTimeout(()=>{
    arena.querySelectorAll('.balloon').forEach(b=>b.remove());
    const msg = popped<5?'Try again! 💪':popped<15?'Amazing! 🌟':'Legendary! 🏆';
    overlay.innerHTML=`
      <div style="font-size:52px">${popped>=15?'🏆':'🎈'}</div>
      <h2>Time's Up!</h2>
      <p>Congrats <strong>${escHtml(name)}</strong>! ${msg}</p>
      <p style="font-size:13px;color:#aaa">Popped: ${popped} balloons</p>
      <div class="big-score">${score}</div>
      <p style="font-size:12px;color:#bbb">puan</p>
      <div style="display:flex;gap:10px;margin-top:6px;">
        <button class="btn" id="restart-btn">Play Again</button>
        <button class="btn secondary" onclick="showTabLb()">Leaderboard 🏆</button>
      </div>`;
    overlay.style.display='flex';
    document.getElementById('restart-btn').addEventListener('click',()=>{
      overlay.innerHTML='';
      overlay.style.display='none';
      showStartOverlay(name);
    });
  },400);
}

function showStartOverlay(prevName='') {
  overlay.innerHTML=`
    <div style="font-size:60px">🎈</div>
    <h2>Balloon Pop!</h2>
    <p>Enter your name and play! Pop as many balloons as you can in 30 seconds.</p>
    <div class="name-row">
      <input type="text" id="player-name" placeholder="Your name?" maxlength="16" autocomplete="off" value="${escHtml(prevName)}"/>
    </div>
    <button class="btn" id="start-btn">Play! 🎮</button>`;
  overlay.style.display='flex';
  document.getElementById('start-btn').addEventListener('click',startGame);
}

function showTabLb() {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('visible'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('leaderboard-screen').classList.add('visible');
  document.querySelectorAll('.tab-btn')[1].classList.add('active');
  loadLeaderboard();
}

// Enter ile başla
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('player-name').addEventListener('keydown', e => {
  if(e.key==='Enter') startGame();
});
</script>

</body>
</html>
